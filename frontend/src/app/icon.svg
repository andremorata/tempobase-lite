<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Clock-inspired "T" lettermark -->
  <!-- Crossbar with rounded ends -->
  <rect x="7" y="7.5" width="18" height="3.5" rx="1.75" fill="#fff"/>
  <!-- Vertical stem — offset slightly right to suggest a clock hand sweeping forward -->
  <rect x="14.25" y="9" width="3.5" height="16.5" rx="1.75" fill="#fff"/>
  <!-- Small dot at base — timer anchor point -->
  <circle cx="16" cy="27" r="1.2" fill="rgba(255,255,255,0.5)"/>
</svg>
